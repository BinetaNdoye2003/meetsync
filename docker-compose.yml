services:

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # ─────────────────────────────────────────
  # SERVICE 1 : Laravel (PHP-FPM)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    volumes:
      - ./meetsync-api:/var/www
    depends_on:
      - db
      - mailpit   

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./meetsync-api:/var/www 
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  frontend:
    image: node:20 
    working_dir: /app
    volumes:
      - ./meetsync-app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"

volumes:
  db_data: {}